# Render Blueprint — free-tier compatible.
# Private services and background workers are not available on free tier.
# Celery worker + beat run inside the CRM web dyno via start.sh.
# Channel stub runs as a public web service.

databases:
  - name: xeno-postgres
    plan: free
    databaseName: xeno_crm
    user: xeno
    postgresMajorVersion: 16

services:
  # ── Redis (broker, cache, channels layer) ──────────────────────────────
  - type: redis
    name: xeno-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  # ── CRM web + Celery worker + beat (all-in-one for free tier) ──────────
  - type: web
    name: xeno-crm
    runtime: python
    plan: free
    rootDir: crm
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py seed_demo && python manage.py collectstatic --noinput
    startCommand: bash start.sh
    healthCheckPath: /admin/login/
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,xeno-crm-xrut.onrender.com"
      - key: SITE_URL
        sync: false  # set to https://xeno-crm.onrender.com after first deploy
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # set to your Vercel frontend URL e.g. https://xeno.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: xeno-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: xeno-redis
          property: connectionString
      - key: CHANNEL_STUB_URL
        fromService:
          type: web
          name: xeno-channel-stub
          property: host
      - key: CHANNEL_STUB_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-v3.2

  # ── Channel stub (public web service — free tier compatible) ───────────
  - type: web
    name: xeno-channel-stub
    runtime: python
    plan: free
    rootDir: channel_stub
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: CHANNEL_STUB_SECRET
        fromService:
          type: web
          name: xeno-crm
          envVarKey: CHANNEL_STUB_SECRET
      - key: CRM_WEBHOOK_URL
        sync: false  # set to https://xeno-crm.onrender.com/api/v1/webhooks/channel-event/
