version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xeno_crm
      POSTGRES_USER: xeno
      POSTGRES_PASSWORD: xeno
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xeno"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  crm:
    build: ./crm
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./crm:/app

  worker:
    build: ./crm
    command: celery -A config worker -l info -Q default,campaigns,scoring
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./crm:/app

  beat:
    build: ./crm
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./crm:/app

  channel_stub:
    build: ./channel_stub
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - redis
    volumes:
      - ./channel_stub:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
